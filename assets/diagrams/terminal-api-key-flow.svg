<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Terminal API key configuration mockup</title>
  <desc id="desc">A terminal-style diagram showing temporary API key setup, Claude launch, verification, and key removal.</desc>
  <rect width="960" height="420" rx="18" fill="#0f1218"/>
  <rect x="34" y="34" width="892" height="352" rx="14" fill="#1b202a" stroke="#3a4656"/>
  <circle cx="64" cy="62" r="7" fill="#ff6b6b"/>
  <circle cx="88" cy="62" r="7" fill="#ffd166"/>
  <circle cx="112" cy="62" r="7" fill="#54d1a8"/>
  <text x="44" y="110" fill="#9aa6b4" font-family="Consolas, monospace" font-size="18">$ export ANTHROPIC_API_KEY="your_api_key_here"</text>
  <text x="44" y="150" fill="#9aa6b4" font-family="Consolas, monospace" font-size="18">$ claude</text>
  <text x="44" y="190" fill="#54d1a8" font-family="Consolas, monospace" font-size="18">Claude Code starts with local environment configuration</text>
  <text x="44" y="250" fill="#9aa6b4" font-family="Consolas, monospace" font-size="18">$ if [ -n "$ANTHROPIC_API_KEY" ]; then echo "set"; fi</text>
  <text x="44" y="290" fill="#ffd166" font-family="Consolas, monospace" font-size="18">set</text>
  <text x="44" y="350" fill="#9aa6b4" font-family="Consolas, monospace" font-size="18">$ unset ANTHROPIC_API_KEY</text>
</svg>

